<!DOCTYPE html>
<html>
<head>
  <title>MambaFX Tracker</title>
</head>

<body>
  <h2>MambaFX Login Tracker</h2>

  <button onclick="login()">Login with Deriv</button>

  <pre id="output">Waiting for login...</pre>

<script>
const BACKEND = "https://mambafx-backend.kenkin1122.workers.dev";

/* ---------------------------
   LOGIN FLOW
----------------------------*/
async function login() {
  try {
    document.getElementById("output").innerText =
      "Requesting login URL...";

    const res = await fetch(BACKEND + "/auth/start", {
      method: "POST"
    });

    const data = await res.json();

    if (!data.auth_url) {
      document.getElementById("output").innerText =
        "Error: No auth URL returned";
      return;
    }

    document.getElementById("output").innerText =
      "Redirecting to Deriv...";

    window.location.href = data.auth_url;

  } catch (err) {
    document.getElementById("output").innerText =
      "Login error: " + err.message;
  }
}

/* ---------------------------
   AFTER REDIRECT BACK
----------------------------*/
window.onload = async function () {
  try {
    document.getElementById("output").innerText =
      "Checking session...";

    const res = await fetch(BACKEND + "/me/session");
    const data = await res.json();

    document.getElementById("output").innerText =
      JSON.stringify(data, null, 2);

  } catch (err) {
    document.getElementById("output").innerText =
      "Session error: " + err.message;
  }
};
</script>

</body>
</html>
