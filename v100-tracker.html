<!DOCTYPE html>
<html>
<head>
  <title>MambaFX Tracker</title>
</head>

<body>
  <h2>MambaFX Login Tracker</h2>

  <button onclick="login()">Login with Deriv</button>

  <pre id="output"></pre>

<script>
const BACKEND = "https://mambafx-backend.kenkin1122.workers.dev";

// STEP 1: Redirect to Deriv login
function login() {
  const appId = "33BoT5hHIzs1muGu7qhww";
  const redirect = window.location.href;

  window.location.href =
    `https://oauth.deriv.com/oauth2/authorize?app_id=${appId}&redirect_uri=${encodeURIComponent(redirect)}`;
}

// STEP 2: Capture token after redirect (FIXED FOR DERIV)
window.onload = async function () {
  const hash = window.location.hash;

  const params = new URLSearchParams(
    hash.replace("#", "")
  );

  const token = params.get("access_token");

  if (token) {
    document.getElementById("output").innerText =
      "Token received... sending to backend";

    try {
      const res = await fetch(BACKEND + "/auth", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ token })
      });

      const data = await res.json();

      document.getElementById("output").innerText =
        JSON.stringify(data, null, 2);

    } catch (err) {
      document.getElementById("output").innerText =
        "Error connecting to backend: " + err.message;
    }
  } else {
    document.getElementById("output").innerText =
      "Waiting for login...";
  }
};
</script>

</body>
</html>
