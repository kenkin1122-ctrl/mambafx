<!DOCTYPE html>
<html>
<head>
  <title>MambaFX Tracker</title>
</head>

<body>
  <h2>MambaFX Login Tracker</h2>

  <button onclick="login()">Login with Deriv</button>

  <pre id="output">Waiting for login...</pre>

<script>
const BACKEND = "https://mambafx-backend.kenkin1122.workers.dev";

/* =========================
   LOGIN
========================= */
async function login() {
  try {
    document.getElementById("output").innerText =
      "Requesting login URL...";

    const res = await fetch(BACKEND + "/auth/start", {
      method: "POST",
      credentials: "include"
    });

    const data = await res.json();

    if (!data.auth_url) {
      document.getElementById("output").innerText =
        "Error: No auth URL returned";
      return;
    }

    document.getElementById("output").innerText =
      "Redirecting to Deriv...";

    window.location.href = data.auth_url;

  } catch (err) {
    document.getElementById("output").innerText =
      "Login error: " + err.message;
  }
}

/* =========================
   CALLBACK HANDLER (IMPORTANT FIX)
========================= */
async function handleCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get("code");
  const state = params.get("state");

  if (!code) return;

  document.getElementById("output").innerText =
    "Returning from Deriv... completing login";

  try {
    const res = await fetch(BACKEND + "/auth/callback?code=" + code + "&state=" + state);
    const data = await res.json();

    document.getElementById("output").innerText =
      "Callback complete:\n\n" + JSON.stringify(data, null, 2);

  } catch (err) {
    document.getElementById("output").innerText =
      "Callback error: " + err.message;
  }
}

/* =========================
   SESSION CHECK
========================= */
async function checkSession() {
  try {
    const res = await fetch(BACKEND + "/me/session", {
      credentials: "include"
    });

    const data = await res.json();

    document.getElementById("output").innerText =
      JSON.stringify(data, null, 2);

  } catch (err) {
    document.getElementById("output").innerText =
      "Session error: " + err.message;
  }
}

/* =========================
   ON LOAD
========================= */
window.onload = async function () {
  await handleCallback();
  await checkSession();
};
</script>

</body>
</html>
